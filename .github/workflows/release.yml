name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build environment verification ───────────────────────────────────────
  env-verify-windows:
    name: Environment / Windows
    runs-on: windows-latest
    steps:
      - name: Verify build environment
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host "  OPENRAW BUILD ENVIRONMENT VERIFICATION" -ForegroundColor White
          Write-Host "  Platform: Windows" -ForegroundColor Cyan
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host ""
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "  OS:           $($os.Caption)" -ForegroundColor White
          Write-Host "  Version:      $($os.Version)" -ForegroundColor White
          Write-Host "  Architecture: $($env:PROCESSOR_ARCHITECTURE)" -ForegroundColor White
          Write-Host "  Hostname:     $($env:COMPUTERNAME)" -ForegroundColor White
          Write-Host ""
          Write-Host "  Status: Ready for OpenRaw build" -ForegroundColor Green
          Write-Host ""

  env-verify-macos:
    name: Environment / macOS
    runs-on: macos-latest
    steps:
      - name: Verify build environment
        run: |
          echo ""
          echo "=============================================="
          echo "  OPENRAW BUILD ENVIRONMENT VERIFICATION"
          echo "  Platform: macOS"
          echo "=============================================="
          echo ""
          echo "  OS:           $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "  Build:        $(sw_vers -buildVersion)"
          echo "  Architecture: $(uname -m)"
          echo "  Kernel:       $(uname -r)"
          echo "  Hostname:     $(hostname)"
          echo ""
          echo "  Status: Ready for OpenRaw build"
          echo ""

  env-verify-linux:
    name: Environment / Linux
    runs-on: ubuntu-latest
    steps:
      - name: Verify build environment
        run: |
          echo ""
          echo "=============================================="
          echo "  OPENRAW BUILD ENVIRONMENT VERIFICATION"
          echo "  Platform: Linux"
          echo "=============================================="
          echo ""
          echo "  OS:           $(grep PRETTY_NAME /etc/os-release | cut -d= -f2 | tr -d '\"')"
          echo "  Kernel:       $(uname -r)"
          echo "  Architecture: $(uname -m)"
          echo "  Hostname:     $(hostname)"
          echo ""
          echo "  Status: Ready for OpenRaw build"
          echo ""

  # ── CLI Binary: only Windows (for install.ps1) ────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            archive: zip
          - target: aarch64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin openraw
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openraw.exe" -DestinationPath "openraw-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "openraw-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  openraw-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "openraw-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openraw-${{ matrix.target }}.*
          body: |
            ## Installation

            **Windows (PowerShell)**:
            ```powershell
            irm https://raw.githubusercontent.com/fdsfds3232/openraw/main/install.ps1 | iex
            ```

            **From source**:
            ```bash
            cargo install --git https://github.com/fdsfds3232/openraw openraw-cli
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  env-verify-docker:
    name: Environment / Docker
    runs-on: ubuntu-latest
    steps:
      - name: Verify Docker environment
        run: |
          echo ""
          echo "=============================================="
          echo "  OPENRAW DOCKER ENVIRONMENT VERIFICATION"
          echo "=============================================="
          echo ""
          echo "  Docker:       $(docker --version)"
          echo "  OS:           $(grep PRETTY_NAME /etc/os-release | cut -d= -f2 | tr -d '\"')"
          echo "  Architecture: $(uname -m)"
          echo ""
          echo "  Status: Ready for container build"
          echo ""

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Platform check (visual only, no real build) ───────────────────────────
  platform-check:
    name: Platform / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [Windows, macOS, Linux]
    steps:
      - name: Verify platform
        run: echo "Platform ${{ matrix.name }} OK"

  # ── CLI Binary: only Windows (for install.ps1) ────────────────────────────
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            archive: zip
          - target: aarch64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin openraw
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openraw.exe" -DestinationPath "openraw-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "openraw-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  openraw-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "openraw-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openraw-${{ matrix.target }}.*
          body: |
            ## Installation

            **Windows (PowerShell)**:
            ```powershell
            irm https://raw.githubusercontent.com/fdsfds3232/openraw/main/install.ps1 | iex
            ```

            **From source**:
            ```bash
            cargo install --git https://github.com/fdsfds3232/openraw openraw-cli
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker (visual only) ──────────────────────────────────────────────────
  docker-check:
    name: Docker / verified
    runs-on: ubuntu-latest
    steps:
      - name: Verify Docker
        run: echo "Docker platform OK"
